services:
  - type: web
    name: acquisti-categorizzati
    env: node
    buildCommand: npm install
    startCommand: node acquisti-server.js
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: acquisti_categorizzati
      - key: MONGODB_COLLECTION
        value: dati
